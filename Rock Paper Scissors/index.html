<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissors</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      padding: 20px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #e94560, #0f3460, #53c0f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    /* Score Board */
    .scoreboard {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .score-card {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 14px 28px;
      text-align: center;
      min-width: 90px;
      backdrop-filter: blur(8px);
    }

    .score-card .label {
      font-size: 0.72rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .score-card .value {
      font-size: 2rem;
      font-weight: 700;
    }

    .score-card.player .value  { color: #53c0f0; }
    .score-card.computer .value { color: #e94560; }
    .score-card.draws .value    { color: #f5a623; }

    /* Arena */
    .arena {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      margin-bottom: 30px;
    }

    .fighter {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 150px;
    }

    .fighter .name {
      font-size: 0.8rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .choice-display {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.15);
      background: rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      transition: transform 0.3s ease;
      backdrop-filter: blur(8px);
    }

    .choice-display.player-side { border-color: rgba(83, 192, 240, 0.4); }
    .choice-display.cpu-side    { border-color: rgba(233, 69, 96, 0.4); }

    .choice-display.bounce {
      animation: bounce 0.5s ease;
    }

    @keyframes bounce {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.3); }
      70%  { transform: scale(0.9); }
      100% { transform: scale(1); }
    }

    .vs-text {
      font-size: 1.6rem;
      font-weight: 900;
      color: #fff;
      opacity: 0.3;
    }

    /* Result banner */
    .result-banner {
      min-height: 48px;
      margin-bottom: 24px;
      text-align: center;
    }

    .result-banner .result-text {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .result-banner .result-text.show {
      opacity: 1;
      transform: translateY(0);
    }

    .result-banner .result-text.win  { color: #53c0f0; }
    .result-banner .result-text.lose { color: #e94560; }
    .result-banner .result-text.draw { color: #f5a623; }

    .result-banner .detail {
      font-size: 0.85rem;
      color: #aaa;
      margin-top: 4px;
      min-height: 20px;
      transition: opacity 0.3s ease;
    }

    /* Buttons */
    .choices {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
    }

    .choice-btn {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      font-size: 2.4rem;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .choice-btn:hover {
      transform: translateY(-6px) scale(1.1);
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.15);
      box-shadow: 0 12px 30px rgba(0,0,0,0.3);
    }

    .choice-btn:active {
      transform: translateY(-2px) scale(1.02);
    }

    .choice-btn .tooltip {
      position: absolute;
      bottom: -24px;
      font-size: 0.65rem;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .choice-btn:hover .tooltip {
      opacity: 1;
    }

    /* Reset */
    .reset-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.25);
      color: #aaa;
      padding: 8px 24px;
      border-radius: 999px;
      font-size: 0.8rem;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }

    .reset-btn:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-color: rgba(255,255,255,0.5);
    }

    /* Countdown overlay */
    .countdown {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.55);
      font-size: 8rem;
      font-weight: 900;
      color: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.15s ease;
    }

    .countdown.show {
      opacity: 1;
      pointer-events: all;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.6rem; }
      .choice-display { width: 90px; height: 90px; font-size: 2.5rem; }
      .choice-btn { width: 72px; height: 72px; font-size: 2rem; }
      .fighter { width: 110px; }
      .scoreboard { gap: 10px; }
      .score-card { padding: 10px 16px; min-width: 70px; }
    }
  </style>
</head>
<body>

  <h1>Rock Paper Scissors</h1>
  <p class="subtitle">Choose your weapon</p>

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="score-card player">
      <div class="label">You</div>
      <div class="value" id="playerScore">0</div>
    </div>
    <div class="score-card draws">
      <div class="label">Draws</div>
      <div class="value" id="drawScore">0</div>
    </div>
    <div class="score-card computer">
      <div class="label">CPU</div>
      <div class="value" id="cpuScore">0</div>
    </div>
  </div>

  <!-- Arena -->
  <div class="arena">
    <div class="fighter">
      <div class="name">You</div>
      <div class="choice-display player-side" id="playerDisplay">🤔</div>
    </div>
    <div class="vs-text">VS</div>
    <div class="fighter">
      <div class="name">CPU</div>
      <div class="choice-display cpu-side" id="cpuDisplay">🤔</div>
    </div>
  </div>

  <!-- Result -->
  <div class="result-banner">
    <div class="result-text" id="resultText">Pick a move!</div>
    <div class="detail" id="resultDetail">Rock beats Scissors · Scissors beats Paper · Paper beats Rock</div>
  </div>

  <!-- Choices -->
  <div class="choices">
    <button class="choice-btn" onclick="play('rock')" aria-label="Rock">
      🪨
      <span class="tooltip">Rock</span>
    </button>
    <button class="choice-btn" onclick="play('paper')" aria-label="Paper">
      📄
      <span class="tooltip">Paper</span>
    </button>
    <button class="choice-btn" onclick="play('scissors')" aria-label="Scissors">
      ✂️
      <span class="tooltip">Scissors</span>
    </button>
  </div>

  <!-- Reset -->
  <button class="reset-btn" onclick="resetGame()">Reset Score</button>

  <!-- Countdown overlay -->
  <div class="countdown" id="countdown"></div>

  <script>
    const emojis = { rock: '🪨', paper: '📄', scissors: '✂️' };
    const choices = ['rock', 'paper', 'scissors'];

    const beats = {
      rock:     { loses_to: 'paper',    beats: 'scissors', detail: 'Paper covers Rock' },
      paper:    { loses_to: 'scissors', beats: 'rock',     detail: 'Scissors cuts Paper' },
      scissors: { loses_to: 'rock',     beats: 'paper',    detail: 'Rock crushes Scissors' }
    };

    let scores = { player: 0, cpu: 0, draws: 0 };
    let busy = false;

    const playerDisplay = document.getElementById('playerDisplay');
    const cpuDisplay    = document.getElementById('cpuDisplay');
    const resultText    = document.getElementById('resultText');
    const resultDetail  = document.getElementById('resultDetail');
    const countdown     = document.getElementById('countdown');

    function showResult(text, cssClass, detail) {
      resultText.className = 'result-text';
      void resultText.offsetWidth;
      resultText.textContent = text;
      resultText.className = `result-text show ${cssClass}`;
      resultDetail.textContent = detail;
    }

    function updateScores() {
      document.getElementById('playerScore').textContent = scores.player;
      document.getElementById('cpuScore').textContent    = scores.cpu;
      document.getElementById('drawScore').textContent   = scores.draws;
    }

    function triggerBounce(el) {
      el.classList.remove('bounce');
      void el.offsetWidth;
      el.classList.add('bounce');
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function showCountdown() {
      const steps = ['3', '2', '1', '✊'];
      countdown.classList.add('show');
      for (const step of steps) {
        countdown.textContent = step;
        await sleep(400);
      }
      countdown.classList.remove('show');
    }

    async function play(playerChoice) {
      if (busy) return;
      busy = true;

      playerDisplay.textContent = '🤔';
      cpuDisplay.textContent    = '🤔';
      resultText.classList.remove('show');
      resultDetail.textContent = '';

      await showCountdown();

      const cpuChoice = choices[Math.floor(Math.random() * 3)];

      playerDisplay.textContent = emojis[playerChoice];
      cpuDisplay.textContent    = emojis[cpuChoice];
      triggerBounce(playerDisplay);
      triggerBounce(cpuDisplay);

      await sleep(300);

      if (playerChoice === cpuChoice) {
        scores.draws++;
        showResult("It's a Draw!", 'draw', `Both picked ${playerChoice}`);
      } else if (beats[playerChoice].beats === cpuChoice) {
        scores.player++;
        showResult('You Win! 🎉', 'win', beats[cpuChoice].detail);
      } else {
        scores.cpu++;
        showResult('CPU Wins! 😤', 'lose', beats[playerChoice].detail);
      }

      updateScores();
      busy = false;
    }

    function resetGame() {
      scores = { player: 0, cpu: 0, draws: 0 };
      updateScores();
      playerDisplay.textContent = '🤔';
      cpuDisplay.textContent    = '🤔';
      resultText.className = 'result-text show draw';
      resultText.textContent = 'Pick a move!';
      resultDetail.textContent = 'Rock beats Scissors · Scissors beats Paper · Paper beats Rock';
    }

    // Init
    resultText.className = 'result-text show draw';
  </script>
</body>
</html>
