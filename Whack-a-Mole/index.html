<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Whack-a-Mole</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-wrapper">

    <!-- START SCREEN -->
    <div id="start-screen" class="screen active">
      <div class="logo">🦔</div>
      <h1 class="title">WHACK!</h1>
      <p class="subtitle">Tap the moles before<br>they hide again.</p>
      <button class="btn" id="start-btn">TAP TO PLAY</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
      <div id="hud">
        <div class="hud-item">
          <span class="hud-lbl">SCORE</span>
          <span class="hud-val" id="score">0</span>
        </div>
        <div class="hud-item timer-wrap">
          <span class="hud-lbl">TIME</span>
          <span class="hud-val" id="timer">30</span>
        </div>
      </div>

      <div id="grid"></div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="gameover-screen" class="screen">
      <div class="logo">😵</div>
      <h1 class="title">TIME UP!</h1>
      <div class="score-block">
        <div class="score-row">
          <span class="score-lbl">SCORE</span>
          <span class="score-val" id="final-score">0</span>
        </div>
        <div class="score-row">
          <span class="score-lbl">BEST</span>
          <span class="score-val accent" id="best-score">0</span>
        </div>
      </div>
      <button class="btn" id="restart-btn">PLAY AGAIN</button>
    </div>

  </div>
  <script src="game.js"></script>
</body>
</html>
