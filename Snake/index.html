<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snake</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-wrapper">

    <!-- START SCREEN -->
    <div id="start-screen" class="screen active">
      <div class="logo">🐍</div>
      <h1 class="title">SNAKE</h1>
      <p class="subtitle">Eat the fruit.<br>Don't bite yourself.</p>
      <button class="btn" id="start-btn">TAP TO PLAY</button>
      <p class="hint">Arrow keys or swipe to move</p>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
      <div id="hud">
        <span id="score">0</span>
      </div>
      <canvas id="canvas"></canvas>
      <!-- Swipe D-pad for mobile -->
      <div id="dpad">
        <button class="dpad-btn" id="btn-up">▲</button>
        <div class="dpad-row">
          <button class="dpad-btn" id="btn-left">◀</button>
          <button class="dpad-btn" id="btn-right">▶</button>
        </div>
        <button class="dpad-btn" id="btn-down">▼</button>
      </div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="gameover-screen" class="screen">
      <h1 class="title">GAME OVER</h1>
      <div class="score-block">
        <div class="score-row">
          <span class="score-lbl">SCORE</span>
          <span class="score-val" id="final-score">0</span>
        </div>
        <div class="score-row">
          <span class="score-lbl">BEST</span>
          <span class="score-val accent" id="best-score">0</span>
        </div>
      </div>
      <button class="btn" id="restart-btn">PLAY AGAIN</button>
    </div>

  </div>
  <script src="game.js"></script>
</body>
</html>
