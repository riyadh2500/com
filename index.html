<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Web3 Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-left">
    <div class="logo-box">
      <svg width="28" height="28" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="knotGrad" x1="10" y1="10" x2="90" y2="90" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1a4fc4"/>
            <stop offset="50%" stop-color="#1a8fc4"/>
            <stop offset="100%" stop-color="#2ec4a0"/>
          </linearGradient>
        </defs>
        <path d="M50 10 C30 10, 10 28, 14 50 C18 72, 38 88, 50 85 C62 88, 82 72, 86 50 C90 28, 70 10, 50 10Z" stroke="url(#knotGrad)" stroke-width="5" fill="none" opacity="0.5"/>
        <path d="M22 38 C30 30, 42 28, 50 34 C58 28, 70 30, 78 38" stroke="url(#knotGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path d="M22 62 C30 70, 42 72, 50 66 C58 72, 70 70, 78 62" stroke="url(#knotGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path d="M38 22 C30 30, 28 42, 34 50 C28 58, 30 70, 38 78" stroke="url(#knotGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path d="M62 22 C70 30, 72 42, 66 50 C72 58, 70 70, 62 78" stroke="url(#knotGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path d="M34 34 C40 40, 44 46, 50 50 C56 54, 62 58, 66 66" stroke="url(#knotGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path d="M66 34 C60 40, 56 46, 50 50 C44 54, 38 58, 34 66" stroke="url(#knotGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>
        <circle cx="50" cy="50" r="14" stroke="url(#knotGrad)" stroke-width="5" fill="none"/>
      </svg>
    </div>
    <span class="brand">Web3 Dashboard</span>
  </div>
  <div class="nav-tabs">
    <button class="ntab active">Dashboard</button>
    <button class="ntab">Rio AI</button>
    <button class="ntab">Game Arena</button>
    <button class="ntab">Predictly</button>
    <button class="ntab">Rialo Agents</button>
  </div>
  <div class="nav-right">
  </div>
</nav>

<div class="scene">
  <canvas id="bgCanvas"></canvas>
  <div class="pgdots left-pg"><span class="pgd"></span><span class="pgd on"></span><span class="pgd"></span></div>
  <div class="pgdots right-pg"><span class="pgd"></span><span class="pgd on"></span><span class="pgd"></span></div>

  <div id="overviewPage" class="ov-page ov-iframe-page" style="display:none">
    <iframe id="rioAiFrame" src="http://localhost:8080/index.html" class="rio-iframe" frameborder="0" allow="clipboard-write" title="Rio AI"></iframe>
  </div>

  <div id="gamePage" class="ov-page ov-iframe-page" style="display:none">
    <iframe id="gameArenaFrame" src="https://game-arina-two.vercel.app/" class="rio-iframe" frameborder="0" allow="clipboard-write; fullscreen" title="Game Arena"></iframe>
  </div>

  <div id="predictlyPage" class="ov-page ov-iframe-page" style="display:none">
    <iframe id="predictlyFrame" src="https://predictly-seven.vercel.app/" class="rio-iframe" frameborder="0" allow="clipboard-write" title="Predictly"></iframe>
  </div>

  <div id="rialoAgentsPage" class="ov-page ov-iframe-page" style="display:none">
    <iframe id="rialoAgentsFrame" src="http://localhost:5175/" class="rio-iframe" frameborder="0" allow="clipboard-write" title="Rialo Agents"></iframe>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
